kind = "web"
previewPath = "/"
title = "قنفات ودواوين فخمة"
version = "1.0.0"
id = "artifacts/sofa-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20171

[services.development]
run = "pnpm --filter @workspace/sofa-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sofa-store", "run", "build" ]
publicDir = "artifacts/sofa-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20171"
BASE_PATH = "/"
